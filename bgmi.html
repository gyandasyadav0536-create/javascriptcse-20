<!DOCTYPE html>
<html>

<head>
    <title>BGMI Lobby</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://wallpaperaccess.com/full/2076096.jpg') no-repeat center center/cover;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
        }

        .player-info {
            font-size: 18x;
        }

        .play-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 20px;
            font-size: 20px;
            background: #ff9900;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .play-btn:hover {
            background: #ff7700;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="player-info">Player: Warrior123 | Level 45</div>
        <div>UC: 1200</div>
    </div>

    <button class="play-btn">START</button>

</body>

</html>
